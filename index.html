  <!-- ESTILO DO OPT-IN -->
  <style>
    .optin-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
    }

    .optin-box {
      background: #111827;
      padding: 20px;
      border-radius: 14px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .optin-box h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .optin-box p {
      font-size: 13px;
      margin-bottom: 12px;
      color: #cbd5f5;
    }

    .optin-form {
      display: flex;
      gap: 6px;
    }

    .optin-form input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    .optin-form button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .optin-form button:hover {
      background: #16a34a;
    }

    .optin-box small {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>

  <!-- 🔥 OPT-IN DE EMAIL -->
  <div class="optin-container">
    <div class="optin-box">
      <h3>🔥 Promoções Dominó FC</h3>
      <p>Receba ofertas e novidades exclusivas.</p>

      <form class="optin-form" onsubmit="handleOptin(event)">

  <script>
    function handleOptin(e) {
      e.preventDefault();
      const email = document.getElementById("emailInput").value;

      if(email) {
        console.log("Email capturado:", email);
        alert("Cadastro realizado!");

        // Aqui você pode enviar pra API depois
        // fetch("SUA_API", { method: "POST", body: JSON.stringify({email}) })

        document.getElementById("emailInput").value = "";
      }
    }
